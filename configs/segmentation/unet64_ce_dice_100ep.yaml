experiment:
  name: unet64_ce_dice_100ep
  project: homework2-segmentation
  output_dir: outputs/enhanced/segmentation/unet64_ce_dice_100ep
  seed: 42
  logger: none

data:
  root: data/stanford_background
  image_dir: images
  mask_dir: labels
  train_split: splits/train.txt
  val_split: splits/val.txt
  num_classes: 8
  image_size: [256, 256]
  ignore_index: -1
  normalize: false

model:
  in_channels: 3
  num_classes: 8
  base_channels: 64
  bilinear: false

train:
  device: cuda
  epochs: 100
  batch_size: 4
  num_workers: 4
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0001
  loss: ce_dice
  ce_weight: 1.0
  dice_weight: 1.0
